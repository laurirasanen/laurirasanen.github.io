<!DOCTYPE html>
<html lang="en-gb">
    <head>
        <link rel="stylesheet" type="text/css" href="./style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="initial-scale=1.0" />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
        <title>Projects - Lauri R&auml;s&auml;nen</title>
        <style>
            h2 {
                color: rgba(255, 255, 255, 0.9);
            }
            p {
                color: rgba(255, 255, 255, 0.9);
            }
            p.font2 {
                color: black;
            }
            .projects-header {
                background-color: white;
                overflow: hidden;
            }
            .projects-released {
                background-color: #3ac969;
                overflow: hidden;
                padding-bottom: 20px;
            }
            .projects-header:after {
                content: "";
                background-color: #3ac969;
                overflow: hidden;
                position: absolute;
                height: 20px;
            }
            .projects-indev {
                background-color: #0099ec;
                overflow: hidden;
                padding-bottom: 20px;
            }

            .projects-abandoned {
                background-color: #df8600;
                overflow: hidden;
                padding-bottom: 20px;
            }
            .projects-misc {
                background-color: #25292c;
                overflow: hidden;
                padding-bottom: 20px;
            }

            .inner-container {
                max-width: 1440px;
                margin: auto;
            }
            .image-container {
                position: relative;
                text-align: left;
                color: white;
                display: inline-block;
            }
            .image:hover {
                filter: brightness(50%);
            }
            .image-title {
                position: absolute;
                top: 8px;
                left: 16px;
                font-size: 200%;
                font-family: 'titillium_webregular';
                color: rgba(255, 255, 255, 0.9);
            }
            .image-description {
                position: absolute;
                top: 48px;
                left: 16px;
                font-size: 120%;
                font-family: 'titillium_webregular';
                color: rgba(255, 255, 255, 0.9);
            }
            .subtitle-header {
                margin-bottom: 100px;
            }
            
        </style>
    </head>
<body>

    <div class="topnav">
        <div class="topnav-container">
            <div class="Links">
                <a href="/">Projects</a>
                <a href="/about.html">About</a>
            </div>
        </div>     
    </div>

    <div class="projects">
        <div class="projects-header">
            <div class="inner-container">
                <div class="title"><h1>Projects</h1></div>
                <div class="subtitle-header">
                    <p class="font2">A collection of programming and/or game-related projects in various stages of development.</p>
                </div>
            </div>
        </div>

        <div class="projects-released">
            <div class="inner-container">
                <div class="title"><h2>Released</h2></div>
                <div class="subtitle" style="margin-bottom: 10px">
                    <p>Projects that are available to the public.</p>
                </div>
            </div>
        </div>

        <div class="projects-indev">
            <div class="inner-container">
                <div class="title"><h2>In The Works</h2></div>
                <div class="subtitle" style="margin-bottom: 10px">
                    <p>Projects currently in development.</p>
                </div>
            </div>
        </div>

        <div class="projects-abandoned">
            <div class="inner-container">
                <div class="title"><h2>Abandoned</h2></div>
                <div class="subtitle" style="margin-bottom: 10px; color: white">
                    <img src="./images/abandoned.png" style="width: 425px;height: auto;border: 0;" />
                </div>
            </div>
        </div>

        <div class="projects-misc">
            <div class="inner-container">
                <div class="title"><h2>Miscellaneous</h2></div>
                <div class="subtitle" style="margin-bottom: 10px; color: white">
                    <p>Miscellaneous stuff.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log();
        $.ajax({
            method: 'GET',
            url: './projectlist.txt',
            success: function (data)
            {
                var projects = JSON.parse(data);                

                for (var i in projects)
                {
					if(projects[i].path !== "null")
					{
						$(`
						<div class="image-container">
							<div class="image">
								<a href=${projects[i].path}>
									<img src=${projects[i].thumbPath} style="width: ${window.innerWidth < 425 ? window.innerWidth + 'px' : '425px'};height: auto;border: 0; background-color: #2f2f2f;" />
								</a>
								<div class="image-title">${projects[i].title}</div>
								<div class="image-description">${projects[i].description}</div>
							</div>
						</div > `)
                        .appendTo($(`.projects-${projects[i].status}`).find('.inner-container'));
					}
					else
					{
						$(`
						<div class="image-container">
							<div class="image">
								<img src=${projects[i].thumbPath} style="width: ${window.innerWidth < 425 ? window.innerWidth + 'px' : '425px'};height: auto;border: 0; background-color: #2f2f2f;" />
								<div class="image-title">${projects[i].title}</div>
								<div class="image-description">${projects[i].description}</div>
							</div>
						</div > `)
                        .appendTo($(`.projects-${projects[i].status}`).find('.inner-container'));
					}
                }
            }
        });
    </script>
    

</body>
</html>
