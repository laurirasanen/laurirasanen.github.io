<!DOCTYPE html>
<html lang="en-gb">
<head>
    <link rel="stylesheet" type="text/css" href="../../style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1.0" />

    <title>Blender Models - Lauri R&auml;s&auml;nen</title>
    <style>
        html, body {
            background-color: #25292c;
        }

        h1, h2, p {
            color: rgba(255, 255, 255, 0.9);
        }

        .container {
            position: relative;
            padding: 0;
            margin: 0;
            background-image: url("../../images/blender_banner.png");
            height: 70%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .contents {
            background: white;
        }

        .gradient {
            position: absolute;
            z-index: 2;
            right: 0;
            bottom: 0;
            left: 0;
            height: 18.75em;
            background: none;
            background: -moz-linear-gradient(top, rgba(37, 41, 44,0) 0%, rgba(37, 41, 44,1) 70%);
            background: -webkit-gradient(linear, left top, left bottom, color-stop(0%,rgba(37, 41, 44,0)), color-stop(70%,rgba(37, 41, 44,1)));
            background: -webkit-linear-gradient(top, rgba(37, 41, 44,0) 0%,rgba(37, 41, 44,1) 70%);
            background: -o-linear-gradient(top, rgba(37, 41, 44,0) 0%,rgba(37, 41, 44,1) 70%);
            background: -ms-linear-gradient(top, rgba(37, 41, 44,0) 0%,rgba(37, 41, 44,1) 70%);
            background: linear-gradient(to bottom, rgba(37, 41, 44,0) 0%,rgba(37, 41, 44,1) 70%);
            filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#00ffffff', endColorstr='#ffffff',GradientType=0 );
        }

        .blender {
            max-width: 75%;
            margin: auto;
            padding-bottom: 1.25em;
        }

        .description {
            padding-bottom: 1.25em;
        }

        .image-container0, .image-container1, .image-container2, .image-container3 {
            position: relative;
            text-align: left;
            color: white;
            display: block;
            overflow: hidden;
        }

    </style>
</head>
<body>

    <div class="topnav">
        <div class="topnav-container">
            <div class="Links">
                <a href="/">Projects</a>
                <a href="/about.html">About</a>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="contents">

        </div>
        <div class="gradient">
        </div>
    </div>
    <div class="blender">
        <div class="title"><h1>Blender models</h1></div>
        <div class="description">
            <p>
                A collection of models made with Blender for practice.
            </p>
        </div>
        <div class="pictures">
            <div class="image-container0">
                <img src="../../images/blender0.png" style="width: 90em;height: 50.625em;border: 0;" />
            </div>
            <div class="image-container1">
                <img src="../../images/blender1.png" style="width: 90em;height: 50.625em;border: 0;" />
