    <style>
        html, body {
            background-color: #25292c;
        }

        h1, h2, p {
            color: rgba(255, 255, 255, 0.9);
        }

        .container {
            position: relative;
            padding: 0px;
            margin: 0px;
            background-image: url("../../images/writerride_banner.png");
            height: 70%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;

        .contents {
            background: white;
        }

        .gradient {
            position: absolute;
            z-index: 2;
            right: 0;
            bottom: 0;
            left: 0;
            height: 300px;
            background: none;
            background: -moz-linear-gradient(top, rgba(37, 41, 44,0) 0%, rgba(37, 41, 44,1) 70%);

            background: -ms-linear-gradient(top, rgba(37, 41, 44,0) 0%,rgba(37, 41, 44,1) 70%);
            background: linear-gradient(to bottom, rgba(37, 41, 44,0) 0%,rgba(37, 41, 44,1) 70%);
            filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#00ffffff', endColorstr='#ffffff',GradientType=0 );
        }

        .writerride {
            max-width: 1440px;
            margin: auto;
            padding-bottom: 50px;
        }

        .writerride a {
            text-decoration: none;
            color: #2196f3
        }

        .writerride a:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .description {
            padding-bottom: 20px;
        }

        .image-container0 {
            position: relative;
            text-align: left;
            color: white;
            display: block;
            overflow: hidden;

        }

        .image-container1 {
            position: relative;
            text-align: left;
            color: white;
            display: block;
            overflow: hidden;
        }

</head>
